<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Signup - JobPortal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <h2><i class="fa-solid fa-shield-halved" style="color:#6c63ff"></i> Admin Signup</h2>
            <p>Create an admin account</p>
            <p id="error-msg" class="error-msg"></p>
            <p id="success-msg" class="success-msg"></p>
            <form id="adminSignupForm">
                <input type="text" id="username" placeholder="Username" required />
                <input type="email" id="email" placeholder="Admin Email" required />
                <input type="password" id="password" placeholder="Password" required />
                <button type="submit">Create Admin Account</button>
            </form>
            <p>Already have an account? <a href="admin-login.html">Admin Login</a></p>
        </div>
    </div>
    <script src="js/admin-auth.js"></script>
</body>
</html>
