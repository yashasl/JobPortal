<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for Job - JobPortal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <script src="js/navbar.js"></script>
    <div class="page-body">
        <div class="container">
            <div class="card">
                <h2><i class="fa-solid fa-briefcase"></i> Job Details</h2>
                <div id="job-details"></div>
            </div>
            <div class="card">
                <h2><i class="fa-solid fa-paper-plane"></i> Submit Application</h2>
                <p id="error-msg" class="error-msg"></p>
                <p id="success-msg" class="success-msg"></p>
                <form id="applyForm">
                    <textarea id="cover_letter" placeholder="Write a short cover letter (optional)..." rows="6"></textarea>
                    <button type="submit">Submit Application</button>
                </form>
            </div>
        </div>
    </div>
    <script src="js/job-apply.js"></script>
</body>
</html>
